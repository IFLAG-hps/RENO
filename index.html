<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENO.ai – 施工後イメージ生成</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0c0c0c;
    font-family: 'DM Sans', 'Hiragino Sans', sans-serif;
    color: #ede9e3;
  }
  ::placeholder { color: #444; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  .container { max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; }

  /* ── Header ── */
  .header { margin-bottom: 40px; }
  .logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .logo-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 600;
    letter-spacing: 0.12em;
    color: #ede9e3;
  }
  .logo-sep { width: 1px; height: 22px; background: #2e2e2e; }
  .logo-sub {
    font-size: 10px; color: #7a6a50; letter-spacing: 0.25em;
    text-transform: uppercase; font-weight: 400;
    line-height: 1.4;
  }
  .tagline { color: #7a7a7a; font-size: 13px; letter-spacing: 0.06em; font-weight: 300; }
  .header-line {
    margin-top: 24px;
    height: 1px;
    background: linear-gradient(to right, #222, transparent);
  }

  /* ── Section ── */
  .section { margin-bottom: 28px; }
  .section-label {
    font-size: 11px; color: #686868; letter-spacing: 0.18em;
    text-transform: uppercase; display: flex; align-items: center;
    gap: 8px; margin-bottom: 10px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: #1e1e1e;
  }

  /* ── API Key ── */
  .key-wrap { position: relative; }
  .key-input {
    background: #141414; border: 1px solid #222;
    border-radius: 6px; color: #ede9e3; font-size: 13px;
    padding: 11px 52px 11px 14px; width: 100%;
    outline: none; transition: border-color 0.2s; font-family: inherit;
    letter-spacing: 0.02em;
  }
  .key-input:focus { border-color: #8a6a3a; }
  .key-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #666; cursor: pointer;
    padding: 0; display: flex; align-items: center; transition: color 0.15s;
  }
  .key-toggle:hover { color: #999; }
  .key-note {
    font-size: 11px; color: #555; margin-top: 6px;
    letter-spacing: 0.04em; display: flex; align-items: center; gap: 5px;
  }

  /* ── Upload ── */
  .upload-zone {
    border: 1px solid #1e1e1e; border-radius: 10px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    background: #111;
  }
  .upload-zone:hover, .upload-zone.drag {
    border-color: #6a5030; background: #131210;
  }
  .upload-placeholder {
    padding: 44px 24px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .upload-icon-wrap {
    width: 48px; height: 48px; border: 1px solid #2a2a2a;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #666; transition: all 0.2s;
  }
  .upload-zone:hover .upload-icon-wrap { border-color: #6a5030; color: #8a6a3a; }
  .upload-text { font-size: 14px; color: #888; letter-spacing: 0.02em; }
  .upload-sub { font-size: 12px; color: #555; letter-spacing: 0.04em; }
  .upload-preview {
    width: 100%; display: block; max-height: 360px;
    object-fit: cover; border-radius: 9px;
  }
  .upload-change {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.75); border: 1px solid #333;
    color: #aaa; border-radius: 5px; padding: 5px 10px;
    cursor: pointer; font-size: 11px; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    font-family: inherit;
  }
  .upload-change:hover { background: rgba(0,0,0,0.9); color: #ccc; }

  /* ── Presets ── */
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .preset-btn {
    background: #111; border: 1px solid #1e1e1e; border-radius: 7px;
    padding: 11px 14px; cursor: pointer; transition: all 0.15s;
    color: #888; font-size: 13px; text-align: left;
    font-family: inherit; letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .preset-btn .icon { flex-shrink: 0; opacity: 0.6; transition: opacity 0.15s; }
  .preset-btn:hover { border-color: #3a2e1e; color: #c0b090; background: #131210; }
  .preset-btn:hover .icon { opacity: 0.9; }
  .preset-btn.active { border-color: #6a5030; background: #13110d; color: #c8a96e; }
  .preset-btn.active .icon { opacity: 1; color: #c8a96e; }

  /* ── Prompt ── */
  .prompt-input {
    background: #111; border: 1px solid #1e1e1e;
    border-radius: 7px; color: #ede9e3; font-size: 13px;
    padding: 11px 14px; width: 100%; outline: none;
    resize: vertical; min-height: 72px; transition: border-color 0.2s;
    font-family: inherit; letter-spacing: 0.02em; line-height: 1.6;
  }
  .prompt-input:focus { border-color: #8a6a3a; }

  /* ── Error ── */
  .error-box {
    background: #120a0a; border: 1px solid #3a1515;
    border-radius: 7px; padding: 10px 14px;
    margin-bottom: 18px; font-size: 12px; color: #c07070;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.02em;
  }

  /* ── Generate ── */
  .gen-btn {
    background: linear-gradient(135deg, #c8a96e 0%, #9a7238 100%);
    border: none; border-radius: 8px; color: #0c0c0c;
    font-weight: 500; font-size: 13px; padding: 14px 32px;
    cursor: pointer; width: 100%;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.1em; font-family: inherit;
    text-transform: uppercase;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .gen-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .gen-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* ── Loading ── */
  .loading { text-align: center; margin-top: 36px; }
  .spinner {
    width: 24px; height: 24px; border: 1.5px solid #222;
    border-top-color: #c8a96e; border-radius: 50%;
    animation: spin 0.9s linear infinite; margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    color: #686868; font-size: 13px; margin-top: 14px;
    letter-spacing: 0.06em;
  }

  /* ── Result ── */
  .result { margin-top: 40px; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .result-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .result-rule { flex: 1; height: 1px; background: #1e1e1e; }
  .result-label {
    font-size: 11px; color: #9a7848; letter-spacing: 0.2em;
    text-transform: uppercase; white-space: nowrap;
  }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .compare-item { position: relative; }
  .compare-img {
    width: 100%; border-radius: 8px; display: block;
    max-height: 260px; object-fit: cover;
  }
  .img-tag {
    position: absolute; top: 10px; left: 10px;
    background: rgba(10,10,10,0.82); font-size: 10px;
    padding: 3px 8px; border-radius: 3px;
    letter-spacing: 0.14em; text-transform: uppercase;
    backdrop-filter: blur(4px);
  }
  .tag-before { color: #b09060; }
  .tag-after { color: #7ab87a; }
  .result-actions { display: flex; gap: 8px; margin-top: 12px; }
  .dl-btn {
    background: #111; border: 1px solid #222; border-radius: 6px;
    color: #b09060; font-size: 13px; padding: 9px 16px;
    text-decoration: none; display: flex; align-items: center; gap: 6px;
    transition: border-color 0.2s, color 0.2s; letter-spacing: 0.04em;
    font-family: inherit;
  }
  .dl-btn:hover { border-color: #6a5030; color: #c8a96e; }
  .retry-btn {
    background: #111; border: 1px solid #1e1e1e; border-radius: 6px;
    color: #777; font-size: 13px; padding: 9px 16px;
    cursor: pointer; font-family: inherit; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px; transition: color 0.15s;
  }
  .retry-btn:hover { color: #aaa; }

  @media (max-width: 540px) {
    .compare-grid { grid-template-columns: 1fr; }
    .preset-grid { grid-template-columns: 1fr; }
    .container { padding: 32px 16px 60px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <span class="logo-wordmark">RENO.ai</span>
      <div class="logo-sep"></div>
      <span class="logo-sub">Interior<br>Visualizer</span>
    </div>
    <p class="tagline">施工後のイメージを、今すぐ確認する</p>
    <div class="header-line"></div>
  </div>

  <!-- API Key -->
  <div class="section">
    <div class="section-label">OpenAI API Key</div>
    <div class="key-wrap">
      <input type="password" id="apiKey" class="key-input" placeholder="sk-proj-...">
      <button class="key-toggle" onclick="toggleKey()" id="keyToggleBtn" title="表示/非表示">
        <!-- Eye icon -->
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <p class="key-note">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      キーはこのブラウザ外に送信されません
    </p>
  </div>

  <!-- Upload -->
  <div class="section">
    <div class="section-label">現状の写真</div>
    <div class="upload-zone" id="uploadZone" onclick="triggerUpload()" ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave()">
      <div class="upload-placeholder" id="uploadPlaceholder">
        <div class="upload-icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="upload-text">クリックまたはドラッグ＆ドロップ</div>
        <div class="upload-sub">JPG · PNG · WEBP</div>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
  </div>

  <!-- Presets -->
  <div class="section">
    <div class="section-label">施工プリセット</div>
    <div class="preset-grid" id="presetGrid"></div>
  </div>

  <!-- Custom Prompt -->
  <div class="section">
    <div class="section-label">カスタム指示</div>
    <textarea id="promptInput" class="prompt-input" placeholder="Change the floor to dark walnut wood, keep everything else the same..."></textarea>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox" style="display:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText"></span>
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn" onclick="generate()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    施工後イメージを生成
  </button>

  <!-- Loading -->
  <div class="loading" id="loadingBox" style="display:none">
    <div class="spinner"></div>
    <p class="loading-text">生成中 — しばらくお待ちください</p>
  </div>

  <!-- Result -->
  <div class="result" id="resultBox" style="display:none">
    <div class="result-header">
      <div class="result-rule"></div>
      <span class="result-label">Rendering Complete</span>
      <div class="result-rule"></div>
    </div>
    <div class="compare-grid">
      <div class="compare-item">
        <span class="img-tag tag-before">Before</span>
        <img id="beforeImg" class="compare-img" src="" alt="before">
      </div>
      <div class="compare-item">
        <span class="img-tag tag-after">After</span>
        <img id="afterImg" class="compare-img" src="" alt="after">
      </div>
    </div>
    <div class="result-actions">
      <a id="dlBtn" class="dl-btn" href="#" download="reno-ai.png">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        ダウンロード
      </a>
      <button class="retry-btn" onclick="resetResult()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.1"/></svg>
        やり直す
      </button>
    </div>
  </div>

</div>
<script>
// SVG icons for presets (inline, minimal geometric)
const ICONS = {
  floor: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="2" y1="6" x2="14" y2="6"/><line x1="2" y1="9" x2="14" y2="9"/><line x1="2" y1="12" x2="14" y2="12"/><rect x="2" y="3" width="12" height="10" rx="1"/></svg>`,
  concrete: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="2" width="5" height="5" rx="0.5"/><rect x="9" y="2" width="5" height="5" rx="0.5"/><rect x="2" y="9" width="5" height="5" rx="0.5"/><rect x="9" y="9" width="5" height="5" rx="0.5"/></svg>`,
  white: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5 8h6M8 5v6"/></svg>`,
  herringbone: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><path d="M2 12 L6 8 L10 12"/><path d="M6 8 L10 4 L14 8"/><path d="M2 8 L6 12"/><path d="M10 12 L14 8"/></svg>`,
  kitchen: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="8" width="12" height="6" rx="1"/><line x1="2" y1="8" x2="14" y2="8"/><circle cx="5.5" cy="4.5" r="1.5"/><circle cx="10.5" cy="4.5" r="1.5"/><line x1="8" y1="10" x2="8" y2="13"/></svg>`,
  navy: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><path d="M3 13 C3 13 5 7 8 7 C11 7 13 13 13 13"/><rect x="2" y="2" width="12" height="5" rx="1"/></svg>`,
};

const PRESETS = [
  { key:'floor',       label: '床材をオーク無垢材に',       prompt: 'Change the floor to light oak hardwood. Keep all furniture, walls, and ceiling exactly the same. Photorealistic interior.' },
  { key:'concrete',    label: '壁をコンクリート打ちっぱなしに', prompt: 'Change the walls to exposed concrete texture. Keep floor, furniture, and ceiling exactly the same. Photorealistic modern interior.' },
  { key:'white',       label: '壁紙をホワイトマットに',      prompt: 'Change all walls to clean matte white paint. Keep floor, furniture, and ceiling exactly the same. Photorealistic interior.' },
  { key:'herringbone', label: '床をヘリンボーンタイルに',    prompt: 'Change the floor to herringbone ceramic tile in light beige. Keep furniture, walls, and ceiling exactly the same. Photorealistic.' },
  { key:'kitchen',     label: 'モダンキッチンに変更',        prompt: 'Transform into a modern minimalist kitchen with handleless matte white cabinets, marble countertops, integrated appliances. Keep room structure.' },
  { key:'navy',        label: '壁をディープネイビーに',      prompt: 'Paint all walls deep navy blue. Keep floor, furniture, and ceiling exactly the same. Photorealistic interior design.' },
];

let currentImageFile = null;
let currentImageURL = null;
let activePreset = null;

// Render presets
const grid = document.getElementById('presetGrid');
PRESETS.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.innerHTML = `<span class="icon">${ICONS[p.key]}</span>${p.label}`;
  btn.onclick = () => selectPreset(i, btn, p.prompt);
  grid.appendChild(btn);
});

function selectPreset(i, btn, prompt) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (activePreset === i) {
    activePreset = null;
    document.getElementById('promptInput').value = '';
  } else {
    btn.classList.add('active');
    activePreset = i;
    document.getElementById('promptInput').value = prompt;
  }
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function triggerUpload() {
  if (currentImageFile) return;
  document.getElementById('fileInput').click();
}

function handleFile(e) {
  const file = e.target.files[0];
  if (file) setImage(file);
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) setImage(file);
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('drag');
}

function onDragLeave() {
  document.getElementById('uploadZone').classList.remove('drag');
}

function setImage(file) {
  currentImageFile = file;
  currentImageURL = URL.createObjectURL(file);
  const zone = document.getElementById('uploadZone');
  zone.onclick = null;
  zone.style.cursor = 'default';
  zone.innerHTML = `
    <img src="${currentImageURL}" class="upload-preview" alt="preview">
    <button class="upload-change" onclick="clearImage(event)">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      変更
    </button>`;
  document.getElementById('resultBox').style.display = 'none';
  hideError();
}

function clearImage(e) {
  e.stopPropagation();
  currentImageFile = null; currentImageURL = null;
  const zone = document.getElementById('uploadZone');
  zone.onclick = triggerUpload; zone.style.cursor = 'pointer';
  zone.innerHTML = `
    <div class="upload-placeholder">
      <div class="upload-icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="upload-text">クリックまたはドラッグ＆ドロップ</div>
      <div class="upload-sub">JPG · PNG · WEBP</div>
    </div>`;
  document.getElementById('fileInput').value = '';
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorBox').style.display = 'flex';
}
function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
function resetResult() {
  document.getElementById('resultBox').style.display = 'none';
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const prompt = document.getElementById('promptInput').value.trim();
  hideError();
  if (!apiKey) { showError('APIキーを入力してください'); return; }
  if (!currentImageFile) { showError('写真をアップロードしてください'); return; }
  if (!prompt) { showError('施工内容を選択または入力してください'); return; }

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';

  try {
    const formData = new FormData();
    formData.append('model', 'gpt-image-1');
    formData.append('image[]', currentImageFile, currentImageFile.name);
    formData.append('prompt', prompt);
    formData.append('n', '1');
    formData.append('size', '1024x1024');

    const res = await fetch('https://api.openai.com/v1/images/edits', {
      method: 'POST',
      headers: { Authorization: `Bearer ${apiKey}` },
      body: formData,
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '生成に失敗しました');

    const imgData = data.data?.[0];
    let src = '';
    if (imgData?.url) src = imgData.url;
    else if (imgData?.b64_json) src = `data:image/png;base64,${imgData.b64_json}`;
    else throw new Error('画像の取得に失敗しました');

    document.getElementById('beforeImg').src = currentImageURL;
    document.getElementById('afterImg').src = src;
    document.getElementById('dlBtn').href = src;
    document.getElementById('resultBox').style.display = 'block';
  } catch (e) {
    showError(e.message);
  } finally {
    document.getElementById('genBtn').disabled = false;
    document.getElementById('loadingBox').style.display = 'none';
  }
}
</script>
</body>
</html>
