<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENO.ai</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#0c0c0c;font-family:'DM Sans','Hiragino Sans',sans-serif;color:#ede9e3;display:flex;flex-direction:column;height:100vh;}
::placeholder{color:#444;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}

/* ── PIN Screen ── */
#pinScreen{
  position:fixed;inset:0;background:#0c0c0c;
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:24px;
}
.pin-card{width:100%;max-width:320px;text-align:center;}
.pin-logo{
  font-family:'Cormorant Garamond',serif;font-size:30px;
  font-weight:600;letter-spacing:0.14em;margin-bottom:4px;
}
.pin-logo-badge{
  display:inline-block;font-size:9px;color:#7a6a50;
  letter-spacing:0.22em;text-transform:uppercase;
  border:1px solid #2a2a2a;padding:2px 7px;border-radius:3px;
  margin-left:8px;vertical-align:middle;
}
.pin-divider{height:1px;background:linear-gradient(to right,transparent,#1e1e1e,transparent);margin:28px 0;}
.pin-label{font-size:11px;color:#686868;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:20px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:28px;}
.pin-dot{
  width:44px;height:52px;background:#111;border:1px solid #222;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:300;color:#ede9e3;letter-spacing:0;
  transition:border-color 0.15s;
}
.pin-dot.filled{border-color:#6a5030;color:#c8a96e;}
.pin-dot.error{border-color:#5a2020;color:#c07070;animation:shake 0.3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}  }
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{
  background:#141414;border:1px solid #1e1e1e;border-radius:8px;
  padding:14px;font-size:18px;font-weight:300;color:#ede9e3;
  cursor:pointer;transition:all 0.12s;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.pin-key:hover{background:#1a1a1a;border-color:#2a2a2a;}
.pin-key:active{transform:scale(0.95);}
.pin-key.del{font-size:14px;color:#666;}
.pin-key.empty{pointer-events:none;background:transparent;border-color:transparent;}

/* ── Header ── */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid #161616;flex-shrink:0;
}
.h-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:0.12em;}
.h-badge{font-size:9px;color:#7a6a50;letter-spacing:0.2em;text-transform:uppercase;border:1px solid #2a2a2a;padding:2px 6px;border-radius:3px;margin-left:8px;vertical-align:middle;}
.h-reset{background:none;border:1px solid #1e1e1e;border-radius:5px;color:#555;font-size:11px;padding:5px 10px;cursor:pointer;letter-spacing:0.04em;font-family:inherit;transition:color 0.15s;display:flex;align-items:center;gap:5px;}
.h-reset:hover{color:#888;}

/* ── Chat ── */
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.msg{display:flex;gap:10px;animation:fadeIn 0.3s ease;}
.msg.user{flex-direction:row-reverse;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.avatar.agent{background:#1a1714;border:1px solid #2a2520;color:#c8a96e;}
.avatar.user{background:#1a1a1a;border:1px solid #222;color:#888;}
.bubble{max-width:78%;padding:11px 15px;border-radius:10px;font-size:13.5px;line-height:1.65;letter-spacing:0.01em;}
.bubble.agent{background:#141414;border:1px solid #1e1e1e;color:#d0cdc8;}
.bubble.user{background:#1a1714;border:1px solid #2a2218;color:#c8b890;}

/* compare */
.compare-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.ci{position:relative;}
.ci img{width:100%;border-radius:6px;display:block;max-height:180px;object-fit:cover;}
.ci-tag{position:absolute;top:7px;left:7px;background:rgba(10,10,10,0.82);font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:0.12em;text-transform:uppercase;backdrop-filter:blur(4px);}
.ci-tag.before{color:#b09060;}
.ci-tag.after{color:#7ab87a;}

/* upload card */
.upload-card{margin-top:10px;border:1px dashed #2a2a2a;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;}
.upload-card:hover{border-color:#6a5030;background:rgba(200,169,110,0.03);}
.upload-card-text{font-size:12px;color:#666;margin-top:6px;letter-spacing:0.03em;}

/* typing */
.typing{display:flex;align-items:center;gap:4px;padding:2px 0;}
.typing span{width:5px;height:5px;background:#333;border-radius:50%;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* ── Share bar ── */
.share-bar{
  display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;
}
.share-btn{
  display:flex;align-items:center;gap:6px;
  border:none;border-radius:7px;padding:8px 14px;
  font-size:12px;font-family:inherit;cursor:pointer;
  letter-spacing:0.03em;transition:all 0.15s;font-weight:500;
}
.share-btn:active{transform:scale(0.97);}
.share-btn.line{background:#06c755;color:#fff;}
.share-btn.line:hover{background:#05b34d;}
.share-btn.copy{background:#1e1e1e;border:1px solid #2a2a2a;color:#c8a96e;}
.share-btn.copy:hover{border-color:#6a5030;}
.share-btn.dl{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;}
.share-btn.dl:hover{color:#bbb;}

.share-btn.pdf{background:#1e1e1e;border:1px solid #2a2a2a;color:#a08060;}
.share-btn.pdf:hover{border-color:#6a5030;color:#c8a96e;}

/* ── PDF loading overlay ── */
#pdfOverlay{
  position:fixed;inset:0;background:rgba(12,12,12,0.88);
  display:none;align-items:center;justify-content:center;
  z-index:200;flex-direction:column;gap:16px;
}
#pdfOverlay .spinner{width:28px;height:28px;border:2px solid #333;border-top-color:#c8a96e;border-radius:50%;animation:spin 0.8s linear infinite;}
#pdfOverlay p{color:#686868;font-size:13px;letter-spacing:0.06em;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Cost Simulator card ── */
.sim-card{
  margin-top:10px;background:#111;border:1px solid #222;
  border-radius:10px;padding:14px;
}
.sim-title{
  font-size:11px;color:#7a6a50;letter-spacing:0.14em;
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.sim-section{margin-bottom:12px;}
.sim-label{font-size:11px;color:#686868;margin-bottom:6px;letter-spacing:0.04em;}
.sim-sizes{display:flex;gap:5px;flex-wrap:wrap;}
.sim-sz{
  background:#1a1a1a;border:1px solid #222;border-radius:5px;
  padding:5px 10px;font-size:12px;color:#888;cursor:pointer;
  font-family:inherit;transition:all 0.15s;
}
.sim-sz.active{border-color:#c8a96e;color:#c8a96e;background:#1a1710;}
.sim-items{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.sim-item{
  display:flex;align-items:center;gap:7px;
  background:#1a1a1a;border:1px solid #1e1e1e;
  border-radius:5px;padding:7px 10px;cursor:pointer;
  transition:all 0.15s;
}
.sim-item.active{border-color:#6a5030;background:#1a1710;}
.sim-item input{display:none;}
.sim-check{
  width:14px;height:14px;border:1px solid #333;border-radius:3px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.sim-item.active .sim-check{background:#c8a96e;border-color:#c8a96e;}
.sim-item-label{font-size:12px;color:#777;transition:color 0.15s;}
.sim-item.active .sim-item-label{color:#d0cdc8;}
.sim-grades{display:flex;gap:5px;}
.sim-grade{
  flex:1;background:#1a1a1a;border:1px solid #222;border-radius:5px;
  padding:7px 6px;font-size:11px;color:#666;cursor:pointer;
  font-family:inherit;text-align:center;transition:all 0.15s;
}
.sim-grade.active{border-color:#c8a96e;color:#c8a96e;background:#1a1710;}
.sim-result{
  background:#141410;border:1px solid #2a2418;border-radius:8px;
  padding:12px 14px;margin-top:4px;
}
.sim-result-label{font-size:10px;color:#7a6a50;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.sim-result-price{font-size:22px;font-weight:300;color:#c8a96e;letter-spacing:0.02em;}
.sim-result-note{font-size:10px;color:#444;margin-top:4px;letter-spacing:0.02em;}
.sim-confirm{
  width:100%;margin-top:10px;background:linear-gradient(135deg,#c8a96e,#9a7238);
  border:none;border-radius:7px;color:#0c0c0c;font-size:12px;font-weight:500;
  padding:10px;cursor:pointer;font-family:inherit;letter-spacing:0.06em;
  text-transform:uppercase;transition:opacity 0.15s;
}
.sim-confirm:hover{opacity:0.88;}

/* ── Suggestion chips ── */
.suggestions{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:4px 0 2px 38px;
  animation:fadeIn 0.3s ease;
}
.chip{
  background:#141414;border:1px solid #2a2520;
  border-radius:20px;padding:7px 14px;
  font-size:12.5px;color:#c8a96e;cursor:pointer;
  font-family:inherit;letter-spacing:0.02em;
  transition:all 0.15s;white-space:nowrap;
}
.chip:hover{background:#1f1c17;border-color:#6a5030;color:#e0c080;}
.chip:active{transform:scale(0.97);}

/* ── Input bar ── */
#inputbar{padding:12px 16px;border-top:1px solid #161616;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
#userInput{
  flex:1;background:#111;border:1px solid #1e1e1e;border-radius:8px;
  color:#ede9e3;font-size:13px;padding:10px 14px;outline:none;
  resize:none;max-height:120px;font-family:inherit;line-height:1.5;
  transition:border-color 0.2s;min-height:42px;
}
#userInput:focus{border-color:#3a2e1e;}
#sendBtn{
  background:linear-gradient(135deg,#c8a96e,#9a7238);border:none;border-radius:7px;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 0.15s;flex-shrink:0;
}
#sendBtn:hover{opacity:0.85;}
#sendBtn:disabled{opacity:0.3;cursor:not-allowed;}

#app{display:none;flex:1;flex-direction:column;height:100vh;overflow:hidden;}
</style>
</head>

<script>
// ── Config ──
const SUPABASE_URL  = 'https://sfhtvtcmgueystyuhzvd.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmaHR2dGNtZ3VleXN0eXVoenZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Nzg0MDYsImV4cCI6MjA5MDM1NDQwNn0.qsON2xYdDf22LtU-jGd96Ubaif0xzzswC9KnzWndKNw';
const EDGE_URL      = `${SUPABASE_URL}/functions/v1/reno-agent`;
const EDGE_HEADERS  = { 'Authorization': `Bearer ${SUPABASE_ANON}`, 'apikey': SUPABASE_ANON };

const SYSTEM_PROMPT = `あなたはRENO.aiのAIリフォームコンサルタントです。
エンドユーザー（施主）とフレンドリーかつプロフェッショナルにチャットし、リフォームの要望をヒアリングして、施工後のビジュアルイメージ生成を提案します。

## 会話の流れ
1. 温かく挨拶し、どの部屋・スペースをリフォームしたいか聞く
2. 現状の状態と変えたい箇所を具体的に聞く（床・壁・キッチンなど）
3. 好みのスタイルを聞く（モダン・ナチュラル・和風・インダストリアルなど）
4. 予算感を軽く聞く
5. 十分な情報が集まったら画像生成を提案し、以下を出力する：
   [GENERATE_IMAGE: {英語の画像生成プロンプト}]

## タグのルール
- 毎回の返答の末尾に必ず [SUGGESTIONS: 選択肢1, 選択肢2, 選択肢3] を付ける
- 選択肢は文脈に合った3〜5個の短い日本語
- 例（部屋を聞く場面）: [SUGGESTIONS: リビング, キッチン, 浴室・洗面所, 寝室, 玄関]
- 例（スタイルを聞く場面）: [SUGGESTIONS: モダン, ナチュラル, 和風, インダストリアル, 北欧風]
- 例（箇所を聞く場面）: [SUGGESTIONS: 床材, 壁紙, キッチン設備, 照明, 収納]
- 例（予算を聞く場面）: [SUGGESTIONS: 50万円以下, 50〜100万円, 100〜200万円, 200万円以上]
- 例（画像生成後）: [SUGGESTIONS: 別の箇所も試す, スタイルを変えてみる, 概算を見る, 提案書を作成]
- 例（予算の話が出たとき）: [SUGGESTIONS: 概算を見る, 50万円以下, 50〜100万円, 100〜200万円, 200万円以上]
- ユーザーが「概算を見る」「費用を知りたい」「いくらかかる」と言ったら [SHOW_SIMULATOR] を単独で出力する
- [GENERATE_IMAGE:...] または [SHOW_SIMULATOR] がある場合は [SUGGESTIONS:...] は不要

## 画像プロンプトのルール
- 英語で記述する
- 変更箇所を明確に、それ以外は "Keep everything else exactly the same. Photorealistic interior design." で締める

## 重要なルール
- 常に日本語で返答する
- 返答は短く（2〜4文程度）
- 一度に聞く質問は1つまで
- タグは必ず末尾に、本文とは改行で区切る
- 親しみやすく、専門的すぎない言葉を使う`;


// ── PIN ──
let pinValue = '';
const CORRECT_PIN = '2759';

function pinKey(k) {
  if (pinValue.length >= 4) return;
  pinValue += k;
  renderDots();
  if (pinValue.length === 4) setTimeout(checkPin, 120);
}

function pinDel() {
  pinValue = pinValue.slice(0, -1);
  renderDots();
}

function renderDots(error = false) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.textContent = pinValue.length > i ? '●' : '';
    d.className = 'pin-dot' + (pinValue.length > i ? ' filled' : '') + (error ? ' error' : '');
  }
}

function checkPin() {
  if (pinValue === CORRECT_PIN) {
    document.getElementById('pinScreen').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
    if (!chatStarted) initChat();
  } else {
    renderDots(true);
    setTimeout(() => { pinValue = ''; renderDots(); }, 600);
  }
}

function lockApp() {
  pinValue = '';
  renderDots();
  document.getElementById('pinScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── Chat ──
let history = [];
let chatStarted = false;

function initChat() {
  chatStarted = true;
  addAgentMessage(
    'こんにちは！RENO.aiへようこそ。\nどのお部屋をリフォームしたいとお考えですか？',
    null, null,
    ['リビング', 'キッチン', '浴室・洗面所', '寝室', '玄関']
  );
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollBottom() {
  const c = document.getElementById('chat');
  c.scrollTop = c.scrollHeight;
}

const agentIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`;
const userIcon  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

function removeSuggestions() {
  const el = document.getElementById('suggestions-row');
  if (el) el.remove();
}

function renderSuggestions(chips) {
  removeSuggestions();
  if (!chips || chips.length === 0) return;
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'suggestions'; div.id = 'suggestions-row';
  chips.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = () => {
      removeSuggestions();
      tapChip(label);
    };
    div.appendChild(btn);
  });
  chat.appendChild(div);
  scrollBottom();
}

function tapChip(text) {
  addUserMessage(text);
  history.push({ role:'user', content: text });
  callAgent();
}

function addAgentMessage(text, afterSrc = null, beforeSrc = null, suggestions = null) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent';
  let inner = `<div class="avatar agent">${agentIcon}</div><div class="bubble agent">`;
  inner += text.replace(/\n/g, '<br>');
  if (afterSrc && beforeSrc) {
    inner += `<div class="compare-pair">
      <div class="ci"><span class="ci-tag before">Before</span><img src="${beforeSrc}" alt="before"></div>
      <div class="ci"><span class="ci-tag after">After</span><img src="${afterSrc}" alt="after"></div>

    inner += `<div class="share-bar">

        LINEで送る

      <button class="share-btn copy" onclick="shareNative('${afterSrc}')">

}

function addUserMessage(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar user">${userIcon}</div><div class="bubble user">${text.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div);
  scrollBottom();
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = 'typing';
  div.innerHTML = `<div class="avatar agent">${agentIcon}</div><div class="bubble agent"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function showUploadCard(prompt) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = 'upload-msg';
  div.innerHTML = `<div class="avatar agent">${agentIcon}</div>
    <div class="bubble agent">
      <div class="upload-card" onclick="document.getElementById('photoInput').click()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <div class="upload-card-text">現在のお部屋の写真をタップしてアップロード</div>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none"
        onchange="handlePhoto(event,'${prompt.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
    </div>`;
  chat.appendChild(div);
  scrollBottom();
}

async function handlePhoto(event, prompt) {
  const file = event.target.files[0];
  if (!file) return;
  const beforeURL = URL.createObjectURL(file);

  const card = document.getElementById('upload-msg');
  if (card) card.remove();
  addUserMessage('📷 写真をアップロードしました');
  addTyping();

  try {
    const form = new FormData();
    form.append('pin', CORRECT_PIN);
    form.append('prompt', prompt);
    form.append('image', file, file.name);

    const res  = await fetch(EDGE_URL, { method:'POST', headers: EDGE_HEADERS, body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '生成に失敗しました');

    const img = data.data?.[0];
    const src = img?.url || (img?.b64_json ? `data:image/png;base64,${img.b64_json}` : null);
    if (!src) throw new Error('画像の取得に失敗しました');

    removeTyping();
    addAgentMessage(
      '施工後のイメージが完成しました！いかがでしょうか？✨',
      src, beforeURL,
      ['別の箇所も試す', 'スタイルを変えてみる', 'もう一度生成する', 'これで進めたい']
    );
    history.push({ role:'assistant', content:'施工後のイメージが完成しました。いかがでしょうか？他の箇所も試してみますか？' });

  } catch(e) {
    removeTyping();
    addAgentMessage(`申し訳ありません、エラーが発生しました。\n${e.message}`);
  }
}

// ── Share functions ──
async function srcToBlob(src) {
  if (src.startsWith('data:')) {
    const res = await fetch(src);
    return await res.blob();
  }
  const res = await fetch(src);
  return await res.blob();
}

async function shareViaLine(src) {
  try {
    const blob = await srcToBlob(src);
    const file = new File([blob], 'reno-ai.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: 'RENO.ai リフォームイメージ',
        text: 'AIが生成したリフォーム後のイメージです✨',
        files: [file],
      });
    } else {
      // fallback: LINE URL scheme with text only
      const url = encodeURIComponent('AIが生成したリフォームイメージをRENO.aiで確認しました！');
      window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(location.href)}&text=${url}`, '_blank');
    }
  } catch(e) {
    if (e.name !== 'AbortError') alert('共有できませんでした: ' + e.message);
  }
}

async function shareNative(src) {
  try {
    const blob = await srcToBlob(src);
    const file = new File([blob], 'reno-ai.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: 'RENO.ai リフォームイメージ',
        text: 'AIが生成したリフォーム後のイメージです✨',
        files: [file],
      });
    } else {
      alert('お使いのブラウザでは共有できません。「保存」からダウンロードしてください。');
    }
  } catch(e) {
    if (e.name !== 'AbortError') alert('共有できませんでした: ' + e.message);
  }
}

// ── PDF Generation ──
async function generatePDF(afterSrc, beforeSrc) {
  const overlay = document.getElementById('pdfOverlay');
  overlay.style.display = 'flex';

  try {
    // 1. Ask Claude to summarize the conversation
    const summaryRes = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pin: CORRECT_PIN, type: 'chat',
        system: `会話履歴からリフォームの要望を抽出し、以下のJSON形式のみで返してください。前後の説明は不要です。
{
  "room": "部屋名",
  "parts": "変更箇所",
  "style": "希望スタイル",
  "budget": "予算",
  "notes": "その他の要望・メモ",
  "summary": "2〜3文の要望まとめ"
}`,
        messages: [
          ...history,
          { role: 'user', content: 'この会話の要望をJSONにまとめてください' }
        ]
      })
    });
    const summaryData = await summaryRes.json();
    const raw = summaryData.content?.[0]?.text || '{}';
    let info = {};
    try {
      const match = raw.match(/\{[\s\S]+\}/);
      info = match ? JSON.parse(match[0]) : {};
    } catch(e) { info = {}; }

    // 2. Load images as base64
    const toBase64 = async (src) => {
      if (src.startsWith('data:')) return src;
      const res = await fetch(src);
      const blob = await res.blob();
      return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
    };
    const [afterB64, beforeB64] = await Promise.all([toBase64(afterSrc), toBase64(beforeSrc)]);

    // 3. Build PDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const pad = 18;

    // Background
    doc.setFillColor(12, 12, 12);
    doc.rect(0, 0, W, H, 'F');

    // Gold accent bar
    doc.setFillColor(200, 169, 110);
    doc.rect(0, 0, W, 1.5, 'F');

    // Logo
    doc.setTextColor(237, 233, 227);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.text('RENO.ai', pad, 22);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(122, 106, 80);
    doc.text('INTERIOR VISUALIZER', pad + 42, 19);

    // Date
    const today = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
    doc.setFontSize(9);
    doc.setTextColor(100, 100, 100);
    doc.text(today, W - pad, 22, { align: 'right' });

    // Divider
    doc.setDrawColor(40, 40, 40);
    doc.setLineWidth(0.3);
    doc.line(pad, 27, W - pad, 27);

    // Title
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.setTextColor(237, 233, 227);
    doc.text('リフォーム提案書', pad, 38);

    // Info table
    const fields = [
      ['対象エリア', info.room || '—'],
      ['施工箇所',   info.parts || '—'],
      ['ご希望スタイル', info.style || '—'],
      ['ご予算',     info.budget || '—'],
    ];
    let y = 48;
    fields.forEach(([label, val]) => {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(100, 100, 100);
      doc.text(label, pad, y);
      doc.setFontSize(10);
      doc.setTextColor(200, 169, 110);
      doc.text(val, pad + 38, y);
      doc.setDrawColor(30, 30, 30);
      doc.setLineWidth(0.2);
      doc.line(pad, y + 3, W - pad, y + 3);
      y += 11;
    });

    // Summary
    if (info.summary) {
      y += 2;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(100, 100, 100);
      doc.text('ご要望メモ', pad, y);
      y += 5;
      doc.setFontSize(9);
      doc.setTextColor(180, 175, 168);
      const lines = doc.splitTextToSize(info.summary, W - pad * 2);
      doc.text(lines, pad, y);
      y += lines.length * 5 + 4;
    }

    // Images
    y += 4;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(122, 106, 80);
    doc.text('BEFORE / AFTER', pad, y);
    y += 5;

    const imgW = (W - pad * 2 - 6) / 2;
    const imgH = imgW * 0.7;

    // Labels
    doc.setFontSize(7);
    doc.setTextColor(176, 144, 96);
    doc.text('BEFORE', pad, y + 4);
    doc.setTextColor(122, 184, 122);
    doc.text('AFTER', pad + imgW + 6, y + 4);
    y += 6;

    try { doc.addImage(beforeB64, 'JPEG', pad, y, imgW, imgH, '', 'MEDIUM'); } catch(e) {}
    try { doc.addImage(afterB64, 'JPEG', pad + imgW + 6, y, imgW, imgH, '', 'MEDIUM'); } catch(e) {}
    y += imgH + 10;

    // Notes
    if (info.notes) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(100, 100, 100);
      doc.text('備考', pad, y);
      y += 5;
      doc.setFontSize(9);
      doc.setTextColor(150, 145, 138);
      const nlines = doc.splitTextToSize(info.notes, W - pad * 2);
      doc.text(nlines, pad, y);
    }

    // Footer
    doc.setFillColor(20, 20, 20);
    doc.rect(0, H - 14, W, 14, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(80, 80, 80);
    doc.text('本提案書はRENO.ai AIエージェントが生成したイメージです。実際の施工内容・費用は担当者にご確認ください。', pad, H - 6);

    doc.save(`RENO-ai-提案書-${Date.now()}.pdf`);

  } catch(e) {
    alert('PDF生成に失敗しました: ' + e.message);
  } finally {
    overlay.style.display = 'none';
  }
}

// ── Cost Simulator ──
const COST_DATA = {
  sizes: [
    { label:'〜6畳', m2: 10 },
    { label:'8畳',   m2: 13 },
    { label:'10畳',  m2: 16 },
    { label:'12畳〜',m2: 20 },
  ],
  items: [
    { key:'floor',   label:'床材',       base:[8,15],   unit:'m2' },
    { key:'wall',    label:'壁紙',       base:[1,2.5],  unit:'m2' },
    { key:'kitchen', label:'キッチン',   base:[60,180], unit:'flat' },
    { key:'bath',    label:'浴室',       base:[60,150], unit:'flat' },
    { key:'toilet',  label:'トイレ',     base:[15,50],  unit:'flat' },
    { key:'wash',    label:'洗面所',     base:[15,50],  unit:'flat' },
    { key:'light',   label:'照明',       base:[8,30],   unit:'flat' },
    { key:'storage', label:'収納',       base:[15,60],  unit:'flat' },
  ],
  grades: [
    { key:'eco',   label:'エコノミー', mult:0.75 },
    { key:'std',   label:'スタンダード', mult:1.0 },
    { key:'pre',   label:'プレミアム',   mult:1.5 },
  ],
};

let simState = { sizeIdx:1, items:new Set(['floor','wall']), gradeIdx:1 };

function calcCost() {
  const m2 = COST_DATA.sizes[simState.sizeIdx].m2;
  const mult = COST_DATA.grades[simState.gradeIdx].mult;
  let lo = 0, hi = 0;
  COST_DATA.items.forEach(item => {
    if (!simState.items.has(item.key)) return;
    if (item.unit === 'm2') { lo += item.base[0] * m2; hi += item.base[1] * m2; }
    else                    { lo += item.base[0] * 10000; hi += item.base[1] * 10000; }
  });
  lo = Math.round(lo * mult / 10000) * 10000;
  hi = Math.round(hi * mult / 10000) * 10000;
  return { lo, hi };
}

function fmtMoney(n) {
  if (n >= 1000000) return (n/10000).toFixed(0) + '万円';
  return (n/10000).toFixed(0) + '万円';
}

function updateSimResult() {
  const { lo, hi } = calcCost();
  const el = document.getElementById('sim-price');
  if (!el) return;
  if (lo === 0) { el.textContent = '項目を選択してください'; return; }
  el.textContent = `${fmtMoney(lo)} 〜 ${fmtMoney(hi)}`;
}

function showSimulator() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = 'sim-msg';

  const sizeBtns = COST_DATA.sizes.map((s,i) =>
    `<button class="sim-sz ${i===simState.sizeIdx?'active':''}" onclick="simSetSize(${i})">${s.label}</button>`
  ).join('');

  const itemBtns = COST_DATA.items.map(item =>
    `<div class="sim-item ${simState.items.has(item.key)?'active':''}" onclick="simToggleItem('${item.key}')">
      <div class="sim-check">
        ${simState.items.has(item.key)?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="#0c0c0c" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>':''}
      </div>
      <span class="sim-item-label">${item.label}</span>
    </div>`
  ).join('');

  const gradeBtns = COST_DATA.grades.map((g,i) =>
    `<button class="sim-grade ${i===simState.gradeIdx?'active':''}" onclick="simSetGrade(${i})">${g.label}</button>`
  ).join('');

  const { lo, hi } = calcCost();

  div.innerHTML = `<div class="avatar agent">${agentIcon}</div>
    <div class="bubble agent">
      <div class="sim-card">
        <div class="sim-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          工事費 概算シミュレーター
        </div>
        <div class="sim-section">
          <div class="sim-label">お部屋の広さ</div>
          <div class="sim-sizes">${sizeBtns}</div>
        </div>
        <div class="sim-section">
          <div class="sim-label">施工箇所（複数選択可）</div>
          <div class="sim-items">${itemBtns}</div>
        </div>
        <div class="sim-section">
          <div class="sim-label">グレード</div>
          <div class="sim-grades">${gradeBtns}</div>
        </div>
        <div class="sim-result">
          <div class="sim-result-label">概算費用</div>
          <div class="sim-result-price" id="sim-price">${lo?fmtMoney(lo)+' 〜 '+fmtMoney(hi):'項目を選択してください'}</div>
          <div class="sim-result-note">※ 相場の目安です。実際の費用は現地調査にてご確認ください。</div>
        </div>
        <button class="sim-confirm" onclick="simConfirm()">この内容で担当者に相談する</button>
      </div>
    </div>`;
  chat.appendChild(div);
  scrollBottom();
}

function simSetSize(i) {
  simState.sizeIdx = i;
  refreshSim();
}
function simToggleItem(key) {
  if (simState.items.has(key)) simState.items.delete(key);
  else simState.items.add(key);
  refreshSim();
}
function simSetGrade(i) {
  simState.gradeIdx = i;
  refreshSim();
}
function refreshSim() {
  const old = document.getElementById('sim-msg');
  if (!old) return;
  old.remove();
  showSimulator();
}
function simConfirm() {
  const { lo, hi } = calcCost();
  const size = COST_DATA.sizes[simState.sizeIdx].label;
  const items = [...simState.items].map(k => COST_DATA.items.find(i=>i.key===k)?.label).join('・');
  const grade = COST_DATA.grades[simState.gradeIdx].label;
  const text = `概算シミュレーション結果：${size}・${items}・${grade}グレードで${fmtMoney(lo)}〜${fmtMoney(hi)}程度です。この内容で進めたいと思います。`;
  document.getElementById('sim-msg')?.remove();
  addUserMessage(text);
  history.push({ role:'user', content: text });
  callAgent();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text || document.getElementById('sendBtn').disabled) return;
  input.value = ''; input.style.height = 'auto';
  removeSuggestions();
  addUserMessage(text);
  history.push({ role:'user', content: text });
  await callAgent();
  document.getElementById('userInput').focus();
}

async function callAgent() {
  document.getElementById('sendBtn').disabled = true;
  addTyping();
  try {
    const res  = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type':'application/json' },
      body: JSON.stringify({ pin: CORRECT_PIN, type:'chat', system: SYSTEM_PROMPT, messages: history }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'APIエラー');

    const raw = data.content?.[0]?.text || '';
    removeTyping();

    // Parse tags
    const genMatch  = raw.match(/\[GENERATE_IMAGE:\s*([\s\S]+?)\]/);
    const simMatch  = raw.match(/\[SHOW_SIMULATOR\]/);
    const sugMatch  = raw.match(/\[SUGGESTIONS:\s*(.+?)\]/);
    const suggestions = sugMatch
      ? sugMatch[1].split(',').map(s => s.trim()).filter(Boolean)
      : null;

    // Clean display text
    let display = raw
      .replace(/\[GENERATE_IMAGE:[\s\S]+?\]/, '')
      .replace(/\[SHOW_SIMULATOR\]/, '')
      .replace(/\[SUGGESTIONS:.+?\]/, '')
      .trim();

    if (genMatch) {
      if (display) addAgentMessage(display);
      history.push({ role:'assistant', content: raw });
      showUploadCard(genMatch[1].trim());
    } else if (simMatch) {
      if (display) addAgentMessage(display);
      history.push({ role:'assistant', content: raw });
      showSimulator();
    } else {
      addAgentMessage(display, null, null, suggestions);
      history.push({ role:'assistant', content: raw });
    }

  } catch(e) {
    removeTyping();
    addAgentMessage(`エラーが発生しました: ${e.message}`);
  }
  document.getElementById('sendBtn').disabled = false;
}
